name: Update Articles

on:
  schedule:
    # 每天北京时间早上 7:00 (UTC 23:00 前一天) 自动跑一次
    - cron: '0 23 * * *'
  workflow_dispatch:  # 也支持在 GitHub 网页上手动触发

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests beautifulsoup4

      - name: Fetch articles
        run: python3 fetch_news.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain articles.json)" ]; then
            git add articles.json
            git commit -m "chore: update articles $(date -u +%F)"
            git push
          else
            echo "No changes."
          fi
